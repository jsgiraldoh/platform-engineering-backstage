apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platformengineering
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jsgiraldoh/platform-engineering-backstage.git
    targetRevision: HEAD
    path: platform-engineering

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
